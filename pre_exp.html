  <body></body>
  <script>
    const jsPsych = initJsPsych();

    // DataPipe 2
    const subject_id = jsPsych.randomization.randomID(10);
    const filename = `${subject_id}.csv`;

let current_trial_index = 0;
Canvaswidth = 1500;
Canvasheight = 1000;

// ウィンドウサイズの最大化 --------------------------------------------------------------
var start_fullscreen = {
  type: jsPsychFullscreen,
  message: '<p>ウィンドウサイズを最大化します。下のボタンを押してください。</p>',
  button_label: '次へ',
  fullscreen_mode: true,
  data: {
    task: 'instruction'
  },
};
//最大化の解除
var end_fullscreen = {
  type: jsPsychFullscreen,
  fullscreen_mode: false,
  data: {
    task: 'instruction'
  },
};

// 実験参加者の情報 --------------------------------------------------------
var par_info = {
  type: jsPsychSurveyText,
  questions: [{
    prompt: '参加者IDを入力してください',
    columns: 10,
    required: true,
    name: 'participantID'
  },
  ],
  button_label: '次へ',
};


var get_par_info = {
  timeline: [par_info],
};

// 教示
const instruction_before_practice_first = {
  type: jsPsychHtmlButtonResponse,
  stimulus:
  '教示。<br>'+
  'モニターに曲がった直線(^,<,>)が表示されます。<br>'+
  '^の大きさが<,>より小さい場合は「s」キー、大きい場合は「l」キーを押してください。<br>'+
  '何か質問があれば、実験者にお尋ねください。<br>' +
  '準備ができましたら、練習を始めます。「次へ」を押してください。',
  canvas_size: [Canvaswidth,
    Canvasheight],
  choices: ['次へ'],
  data: {
    task: 'instruction'
  },
};

start_plactice_first = {
  timeline: [get_par_info,instruction_before_practice_first]
}

const blanck = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '<p> </p>',
  choices: [' '],
  // どのキー入力も受け付けない
  data: {
    task: 'blank'
  },
  trial_duration: 500,
};

function experiment_plactice_first(p) {
  // おまじない
  let trial = jsPsych.getCurrentTrial();
  // これはタイムラインのデータを拾う（使い方はjsPsychのサイトを参照）。
  let angle = jsPsych.timelineVariable("angle", true);
  let upper_length = jsPsych.timelineVariable("upper_length", true);


  p.setup = function () {
    //刺激のデータ
    trial.data.angle = angle
    trial.data.upper_length = upper_length
    
    p.createCanvas(Canvaswidth,Canvasheight);
    line_length = 150*1.5
    line_depart = 100*1.5
    lang = p.PI
    upper_line_length = line_length+line_length*(upper_length/100)
    pangle = (180-angle)/180
    stp = p.PI*3/2
    nw0 = p.millis();
    p.noCursor()
  }

  p.draw = function() {
    p.background(220);
    p.strokeWeight(4)
    p.noFill()
    p.translate(p.width/2, p.height/2)
    for (i = 0; i < 3; i++) {
    if(i==0){
      long=upper_line_length
    }
    else{
      long=line_length
    }
    dism = p.tan(p.PI*pangle/2)*long/2+line_depart
    p.beginShape()
    p.vertex(line_depart*p.cos(stp+2*p.PI*i/3)-long/2*p.cos(lang+2*p.PI*i/3),line_depart*p.sin(stp+2*p.PI*i/3)-long/2*p.sin(lang+2*p.PI*i/3))
    p.vertex(dism*p.cos(stp+2*p.PI*i/3),dism*p.sin(stp+2*p.PI*i/3))
    p.vertex(line_depart*p.cos(stp+2*p.PI*i/3)+long/2*p.cos(lang+2*p.PI*i/3),line_depart*p.sin(stp+2*p.PI*i/3)+long/2*p.sin(lang+2*p.PI*i/3))
    p.endShape()
  }
    }

  p.keyTyped = function() {
    if (p.key === 's') {
      trial.data.result = 0
      trial.data.rt = p.millis() - nw0;
      trial.end_trial();
    };
    if (p.key === 'l') {
      trial.data.result = 1
      trial.data.rt = p.millis() - nw0;
      trial.end_trial();
    };
  };
};

const instruction_after_practice = {
  type: jsPsychHtmlButtonResponse,
  stimulus:
  'それでは本試行にうつります',
  canvas_size: [Canvaswidth,
    Canvasheight],
  choices: ['次へ'],
  data: {
    task: 'instruction'
  },
};

let p5_trial_experiment_plactice_first = {
  type: jsPsychP5,
  sketch: experiment_plactice_first,
  // このトライアル用のスケッチ（関数）を指定
  data: {
    task: 'plactice_first',
  }
}

let plactice_factors = {
  upper_length:[-10,50],
  pre_circle:[60, 180,]
}

let stimulus_plactice = jsPsych.randomization.factorial(plactice_factors,1)

let trial_experiment_plactice_first = {
  timeline: [blanck,
    p5_trial_experiment_plactice_first,
    blanck],
  //刺激条件を代入
  timeline_variables: stimulus_plactice,
  repetitions: 1,
  //繰り返しの数
  //randomize_order: true,
  //ランダム化するか否か
};

start_experiment = {
  timeline: [instruction_after_practice]
}

function experiment_first(p) {
  // おまじない
  let trial = jsPsych.getCurrentTrial();
  // これはタイムラインのデータを拾う（使い方はjsPsychのサイトを参照）。
  let pre_circle = jsPsych.timelineVariable("pre_circle", true);
  let upper_length = jsPsych.timelineVariable("upper_length", true);


  p.setup = function () {
    //刺激のデータ
    trial.data.pre_circle = pre_circle
    trial.data.upper_length = upper_length
    
    p.createCanvas(Canvaswidth,Canvasheight);
    illusion_size = 300
    circle_size = 50
    circle_dis = 100//先行研究を確認する
    line_number = 10
    nw0 = p.millis();
    p.noCursor()
  }

  p.draw = function() {
    p.background(255);
    p.strokeWeight(5)
    p.stroke(0)
    p.noFill()
    p.translate(p.width/2, p.height/2)
    p.strokeCap(p.PROJECT)
    reactiontime=p.millis()-nw0
    if(reactiontime<=100&&pre_circle==1){
     circle(0,illusion_size-circle_dis,circle_size)
     circle(0,illusion_size+circle_dis,circle_size)
    }
    if(reactiontime<=100&&pre_circle==2){
     circle(illusion_size-circle_dis,0,circle_size)
     circle(illusion_size+circle_dis,0,circle_size)
    }
    if(reactiontime>100){
        if(illusion==1){
            p.line(0,-illusion_size/2,0,illusion_size/2)
            p.line(-illusion_size/2,illusion_size,illusion_size/2,illusion_size)
        }
        if(illusion==2){
            for(i=0;i<=line_number;i++){
                line(-illusion_size/2+illusion_size*i/num,-illusion_size/2,-illusion_size/2+illusion_size*i/num,illusion_size/2)
            }
        }
        if(illusion==3){
            for(i=0;i<=line_number;i++){
                line(-illusion_size/2,-illusion_size/2+illusion_size*i/num,illusion_size/2,-illusion_size/2+illusion_size*i/num)
            }
        }
    }
  }


  p.keyTyped = function() {
    if (p.key === 'f') {
      trial.data.result = 0
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
    if (p.key === 'j') {
      trial.data.result = 1
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
  };
};


let p5_trial_experiment_first = {
  type: jsPsychP5,
  sketch: experiment_first,
  // このトライアル用のスケッチ（関数）を指定
  data: {
    task: 'trial_first',
  }
}

let factors = {
  illusion:[1,2,3],
  pre_circle:[1,2]
}

let stimulus_list_first = jsPsych.randomization.factorial(factors,15)

let trial_experiment_first = {
  timeline: [blanck,
    p5_trial_experiment_first,
    blanck],
  //刺激条件を代入
  timeline_variables: stimulus_list_first,
  repetitions: 1,
  //繰り返しの数
  //randomize_order: true,
  //ランダム化するか否か
};


//実験後のお礼
var inst_closing = {
  type: jsPsychHtmlKeyboardResponse,

  prompt: 'そのまま待機してください。5秒経過すると自動でウィンドウサイズがもとに戻ります。',

    task: 'instruction'

};

jsPsych.run([
  //start_fullscreen,
  //start_plactice_first,

  trial_experiment_first,
  inst_closing,
  end_fullscreen])

    </script>
