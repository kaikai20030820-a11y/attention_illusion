function experiment_plactice_n(p) {
  // おまじない
  let trial = jsPsych.getCurrentTrial();
  // これはタイムラインのデータを拾う（使い方はjsPsychのサイトを参照）。
  let illusion = jsPsych.timelineVariable("illusion", true);


  p.setup = function () {
    //刺激のデータ
    trial.data.illusion = illusion
    
    p.createCanvas(Canvaswidth,Canvasheight);
    illusion_size = 300
    circle_size = 50
    circle_dis = 50//先行研究を確認する
    line_number = 10
    nw0 = p.millis();
    p.noCursor()
  }

  p.draw = function() {
    p.background(255);
    p.strokeWeight(5)
    p.stroke(0)
    p.noFill()
    p.translate(p.width/2, p.height/2)
    p.strokeCap(p.PROJECT)
    reactiontime=p.millis()-nw0
    if(illusion==1){
        effect_size=-60
        p.line(0,-illusion_size/2,0,illusion_size/2)
        p.line(-illusion_size/2-effect_size/2,illusion_size/2,illusion_size/2+effect_size/2,illusion_size/2)
    }
    if(illusion==2){
        effect_size=60
        for(i=0;i<=line_number;i++){
            p.line(-(illusion_size+effect_size)/2+(illusion_size+effect_size)*i/line_number,-illusion_size/2,-(illusion_size+effect_size)/2+(illusion_size+effect_size)*i/line_number,illusion_size/2)
        }
    }
    if(illusion==3){
        effect_size=-60
        for(i=0;i<=line_number;i++){
            p.line(-illusion_size/2,-(illusion_size+effect_size)/2+(illusion_size+effect_size)*i/line_number,illusion_size/2,-(illusion_size+effect_size)/2+(illusion_size+effect_size)*i/line_number)
        }
    }
  }


  p.keyTyped = function() {
    if (p.key === 'f') {
      trial.data.result = 0
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
    if (p.key === 'j') {
      trial.data.result = 1
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
    if (p.key === ' ') {
      trial.data.result = 2
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
  };
};

function createRandomPairs(arr1, arr2) {
  // 1. 2つ目の配列のコピーを作り、ランダムにシャッフルする
  const shuffledArr2 = [...arr2];
  for (let i = shuffledArr2.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledArr2[i], shuffledArr2[j]] = [shuffledArr2[j], shuffledArr2[i]];
  }

  // 2. 1つ目の配列を基準にして、シャッフルされた2つ目の配列とペアにする
  return arr1.map((item, index) => {
    return [item, shuffledArr2[index]];
  });
}
