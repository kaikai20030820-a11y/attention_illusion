function experiment_plactice(p) {
  // おまじない
  let trial = jsPsych.getCurrentTrial();
  // これはタイムラインのデータを拾う（使い方はjsPsychのサイトを参照）。
  let illusion = jsPsych.timelineVariable("illusion", true);
  let effect_size = jsPsych.timelineVariable("effect_size", true);


  p.setup = function () {
    //刺激のデータ
    trial.data.illusion = illusion
    trial.data.effect_size = effect_size
    
    p.createCanvas(Canvaswidth,Canvasheight);
    illusion_size = 150
    line_number = 10
    nw0 = p.millis();
    p.noCursor()
  }

  p.draw = function() {
    p.background(255);
    p.strokeWeight(2.5)
    p.stroke(0)
    p.noFill()
    p.translate(p.width/2, p.height/2)
    p.strokeCap(p.PROJECT)
    reactiontime=p.millis()-nw0
    if(illusion==1){
        p.line(0,-illusion_size/2,0,illusion_size/2)
        p.line(-illusion_size/2-effect_size/2,illusion_size/2,illusion_size/2+effect_size/2,illusion_size/2)
    }
    if(illusion==2){
        for(i=0;i<=line_number;i++){
            p.line(-illusion_size/2,-(illusion_size+effect_size)/2+(illusion_size+effect_size)*i/line_number,illusion_size/2,-(illusion_size+effect_size)/2+(illusion_size+effect_size)*i/line_number)
        }
    }
  }


  p.keyTyped = function() {
    if (p.key === 'f') {
      trial.data.result = 0
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
    if (p.key === 'j') {
      trial.data.result = 1
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
  };
};

function experiment_covert_Helmholtz(p) {
  // おまじない
  let trial = jsPsych.getCurrentTrial();
  // これはタイムラインのデータを拾う（使い方はjsPsychのサイトを参照）。
  let pre_circle = jsPsych.timelineVariable("pre_circle", true);
  let shape = jsPsych.timelineVariable("shape", true);


  p.setup = function () {
    //刺激のデータ
    trial.data.pre_circle = pre_circle
    trial.data.shape = shape

    
    p.createCanvas(Canvaswidth,Canvasheight);
    illusion_size = 150
    circle_size = 50
    circle_dis = 50//先行研究を確認する
    line_number = 10
    nw0 = p.millis();
    p.noCursor()
  }

  p.draw = function() {
    p.background(255);
    p.strokeWeight(2.5)
    p.stroke(0)
    p.noFill()
    p.translate(p.width/2, p.height/2)
    p.strokeCap(p.PROJECT)
    reactiontime=p.millis()-nw0
    if(reactiontime<=100&&pre_circle==1){
        if(shape[1]==1){
            p.ellipse(0,-illusion_size/2-circle_dis,circle_size,circle_size)
            p.ellipse(0,illusion_size/2+circle_dis,circle_size,circle_size)
        }
        if(shape[1]==2){
            p.line(circle_size/2,-illusion_size/2-circle_dis-circle_size/2,-circle_size/2,-illusion_size/2-circle_dis+circle_size/2)
            p.line(-circle_size/2,-illusion_size/2-circle_dis-circle_size/2,circle_size/2,-illusion_size/2-circle_dis+circle_size/2)
            p.line(circle_size/2,illusion_size/2+circle_dis+circle_size/2,-circle_size/2,illusion_size/2+circle_dis-circle_size/2)
            p.line(-circle_size/2,illusion_size/2+circle_dis+circle_size/2,circle_size/2,illusion_size/2+circle_dis-circle_size/2)
        }
        if(shape[1]==3){
            p.line(circle_size/2,-illusion_size/2-circle_dis-circle_size/2,-circle_size/2,-illusion_size/2-circle_dis+circle_size/2)
            p.line(-circle_size/2,-illusion_size/2-circle_dis-circle_size/2,circle_size/2,-illusion_size/2-circle_dis+circle_size/2)
            p.ellipse(0,illusion_size/2+circle_dis,circle_size,circle_size)
        }
        if(shape[1]==4){
            p.ellipse(0,-illusion_size/2-circle_dis,circle_size,circle_size)
            p.line(circle_size/2,illusion_size/2+circle_dis+circle_size/2,-circle_size/2,illusion_size/2+circle_dis-circle_size/2)
            p.line(-circle_size/2,illusion_size/2+circle_dis+circle_size/2,circle_size/2,illusion_size/2+circle_dis-circle_size/2)
        }
    }
    if(reactiontime<=100&&pre_circle==2){
        if(shape[1]==1){
            p.ellipse(-illusion_size/2-circle_dis,0,circle_size,circle_size)
            p.ellipse(illusion_size/2+circle_dis,0,circle_size,circle_size)
        }
        if(shape[1]==2){
            p.line(-illusion_size/2-circle_dis-circle_size/2,circle_size/2,-illusion_size/2-circle_dis+circle_size/2,-circle_size/2)
            p.line(-illusion_size/2-circle_dis-circle_size/2,-circle_size/2,-illusion_size/2-circle_dis+circle_size/2,circle_size/2)
            p.line(illusion_size/2+circle_dis-circle_size/2,circle_size/2,illusion_size/2+circle_dis+circle_size/2,-circle_size/2)
            p.line(illusion_size/2+circle_dis-circle_size/2,-circle_size/2,illusion_size/2+circle_dis+circle_size/2,circle_size/2)
        }
        if(shape[1]==3){
            p.line(-illusion_size/2-circle_dis-circle_size/2,circle_size/2,-illusion_size/2-circle_dis+circle_size/2,-circle_size/2)
            p.line(-illusion_size/2-circle_dis-circle_size/2,-circle_size/2,-illusion_size/2-circle_dis+circle_size/2,circle_size/2)
            p.ellipse(illusion_size/2+circle_dis,0,circle_size,circle_size)
        }
        if(shape[1]==4){
            p.ellipse(-illusion_size/2-circle_dis,0,circle_size,circle_size)
            p.line(illusion_size/2+circle_dis-circle_size/2,circle_size/2,illusion_size/2+circle_dis+circle_size/2,-circle_size/2)
            p.line(illusion_size/2+circle_dis-circle_size/2,-circle_size/2,illusion_size/2+circle_dis+circle_size/2,circle_size/2)
        }
    }
    if(reactiontime>100&&reactiontime<400){
        for(i=0;i<=line_number;i++){
            p.line(-illusion_size/2,-(illusion_size+shape[0]/2)/2+(illusion_size+shape[0]/2)*i/line_number,illusion_size/2,-(illusion_size+shape[0]/2)/2+(illusion_size+shape[0]/2)*i/line_number)
        }
    }
  }


  p.keyTyped = function() {
    if (p.key === 'f') {
      trial.data.result = 0
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
    if (p.key === 'j') {
      trial.data.result = 1
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
    if (p.key === ' ') {
      trial.data.result = 2
      trial.data.rt = reactiontime;
      trial.end_trial();
    };
  };
};

function createRandomPairs(arr1, arr2) {
  // 1. 2つ目の配列のコピーを作り、ランダムにシャッフルする
  const shuffledArr2 = [...arr2];
  for (let i = shuffledArr2.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledArr2[i], shuffledArr2[j]] = [shuffledArr2[j], shuffledArr2[i]];
  }

  // 2. 1つ目の配列を基準にして、シャッフルされた2つ目の配列とペアにする
  return arr1.map((item, index) => {
    return [item, shuffledArr2[index]];
  });
}

function combineAndShuffle(arr1, arr2) {
  // 1. スプレッド構文で2つの配列を結合し、新しい配列を作成
  const combined = [...arr1, ...arr2];

  // 2. フィッシャー–イェーツのシャッフルでランダムに並び替え
  for (let i = combined.length - 1; i > 0; i--) {
    // 0 から i の範囲でランダムな整数 j を生成
    const j = Math.floor(Math.random() * (i + 1));
    
    // 要素 i と要素 j を入れ替える（分割代入を使用）
    [combined[i], combined[j]] = [combined[j], combined[i]];
  }

  return combined;
}

function shuffleArray(array) {
  const cloneArray = [...array];
  for (let i = cloneArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cloneArray[i], cloneArray[j]] = [cloneArray[j], cloneArray[i]];
  }
  return cloneArray;
}
